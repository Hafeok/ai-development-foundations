# Two Pillars framework registry
#
# One entry per framework. Schema:
#
#   - name:            human-readable framework name
#     repository:      URL of the framework's own repo
#     pillars:         [specification] | [execution] | [specification, execution]
#     coverage:        free-text — which layers/blocks are covered
#     conformance:     URL of the framework's published conformance statement
#     foundation_ref:  commit/tag of ai-development-foundations the statement was checked against
#     maintainer:      name or handle
#     license:         framework's license
#
# Listing records a SELF-DECLARED claim. It is not an endorsement.
# Add your entry alphabetically within its pillar group.

frameworks: []

